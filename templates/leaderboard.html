{% extends "base.html" %}

{% block title %}Лидеры - CodeLearn{% endblock %}

{% block content %}
<h1 class="text-center text-white mb-4">Таблицы лидеров</h1>

<div class="card">
    <div class="card-header bg-white">
        <div class="list-group">

            {% for name, completed, xp in data %}
            <div class="list-group-item module-card">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1">{{ name }}</h5>
                        <small>Уроков пройдено: {{ completed }}</small><br>
                        <small>Опыт: {{ xp }}</small>
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>
    </div>
</div>
{% endblock %}
